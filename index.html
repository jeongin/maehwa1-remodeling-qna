<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매화마을1단지 리모델링 Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef; --surface: #ffffff; --surface2: #faf9f7;
    --border: #e2ddd5; --accent: #2c5f8a; --accent-light: #e8f1f8;
    --accent2: #c8773a; --text: #1a1a1a; --text-muted: #7a7068;
    --tag-bg: #edf4f9; --shadow: 0 2px 12px rgba(0,0,0,0.07); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 로그인 게이트 ── */
  #gateScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; padding: 24px;
  }
  .gate-box {
    background: var(--surface); border-radius: 20px;
    padding: 40px 32px; width: 100%; max-width: 380px;
    box-shadow: 0 8px 48px rgba(44,95,138,0.15); text-align: center;
  }
  .gate-logo { font-size: 2.4rem; margin-bottom: 14px; }
  .gate-title { font-family: 'Noto Serif KR', serif; font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; line-height: 1.4; }
  .gate-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .gate-form { text-align: left; }
  .gate-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .gate-input {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.92rem; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 12px;
  }
  .gate-input:focus { border-color: var(--accent); }
  .gate-btn {
    width: 100%; background: var(--accent); color: white; border: none;
    padding: 12px; border-radius: 8px; font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
    cursor: pointer; transition: background 0.15s; margin-top: 4px;
  }
  .gate-btn:hover { background: #245079; }
  .gate-btn:disabled { background: #aaa; cursor: not-allowed; }
  .gate-error { font-size: 0.78rem; color: #dc2626; margin-top: 10px; min-height: 18px; text-align: center; }

  /* ── 헤더 ── */
  header {
    background: var(--accent); color: white;
    padding: 18px 24px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(44,95,138,0.3);
  }
  .header-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .header-title { font-family: 'Noto Serif KR', serif; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
  .header-subtitle { font-size: 0.72rem; opacity: 0.7; margin-top: 2px; font-weight: 300; }
  .sync-status { font-size: 0.72rem; opacity: 0.85; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; flex-shrink: 0; }
  .dot.off { background: #f87171; }
  .dot.loading { background: #fbbf24; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
  .role-badge {
    display: inline-block; font-size: 0.65rem; padding: 2px 8px;
    border-radius: 4px; font-weight: 700; margin-left: 8px; vertical-align: middle;
  }
  .role-badge.admin  { background: var(--accent2); color: white; }
  .role-badge.member { background: rgba(255,255,255,0.25); color: white; }
  .btn-header {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 7px 14px; border-radius: 6px;
    font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn-header:hover { background: rgba(255,255,255,0.25); }

  /* ── 메인 ── */
  main { max-width: 760px; margin: 0 auto; padding: 24px 16px 80px; }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  #searchInput {
    width: 100%; padding: 12px 14px 12px 40px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 0.95rem; font-family: 'Noto Sans KR', sans-serif;
    background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  #searchInput:focus { border-color: var(--accent); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .chip {
    padding: 5px 13px; border-radius: 999px; border: 1.5px solid var(--border);
    font-size: 0.78rem; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; background: var(--surface); color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .stats-bar { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 14px; }
  .qa-list { display: flex; flex-direction: column; gap: 10px; }

  .qa-item {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: box-shadow 0.15s, border-color 0.15s; box-shadow: var(--shadow);
  }
  .qa-item:hover { border-color: #c8d8e8; box-shadow: 0 4px 18px rgba(44,95,138,0.1); }
  .qa-question { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
  .qa-q-mark {
    width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: white;
    font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; font-family: 'Noto Serif KR', serif;
  }
  .qa-q-content { flex: 1; min-width: 0; }
  .qa-q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.45; margin-bottom: 6px; }
  .qa-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .qa-tag { background: var(--tag-bg); color: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .qa-date { font-size: 0.7rem; color: var(--text-muted); }
  .qa-chevron { color: var(--text-muted); font-size: 0.85rem; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
  .qa-item.open .qa-chevron { transform: rotate(180deg); }
  .qa-answer { display: none; padding: 14px 16px 16px 50px; border-top: 1px solid var(--border); background: var(--surface2); }
  .qa-item.open .qa-answer { display: block; }
  .qa-a-mark {
    display: inline-flex; width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent2); color: white; font-size: 0.75rem; font-weight: 700;
    align-items: center; justify-content: center;
    margin-right: 8px; margin-bottom: 8px; font-family: 'Noto Serif KR', serif; vertical-align: middle;
  }
  .qa-a-text { font-size: 0.9rem; line-height: 1.7; color: #2a2a2a; white-space: pre-wrap; word-break: keep-all; }
  .qa-item-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .btn-sm {
    font-size: 0.72rem; font-family: 'Noto Sans KR', sans-serif; padding: 4px 10px;
    border-radius: 5px; border: 1px solid var(--border); cursor: pointer;
    background: white; color: var(--text-muted); transition: all 0.12s;
  }
  .btn-sm:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .btn-sm.danger:hover { background: #fef2f2; color: #dc2626; border-color: #dc2626; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .fab {
    position: fixed; bottom: 28px; right: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: white; font-size: 1.5rem; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(44,95,138,0.4);
    display: none; align-items: center; justify-content: center;
    transition: transform 0.15s; z-index: 50;
  }
  .fab.visible { display: flex; }
  .fab:hover { transform: scale(1.08); }

  /* ── 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 200; padding: 16px; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  @media (min-width: 600px) { .modal-overlay { align-items: center; } }
  .modal {
    background: var(--surface); border-radius: 16px;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 24px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-title { font-family: 'Noto Serif KR', serif; font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-control {
    width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 0.92rem; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; resize: vertical;
  }
  .form-control:focus { border-color: var(--accent); }
  textarea.form-control { min-height: 100px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary {
    background: var(--accent); color: white; border: none; padding: 10px 22px;
    border-radius: 7px; font-size: 0.9rem; font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: #245079; }
  .btn-cancel {
    background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border);
    padding: 10px 18px; border-radius: 7px; font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
  }

  mark { background: #fff3b0; color: inherit; border-radius: 2px; padding: 0 1px; }
  .spinner-wrap { display: flex; justify-content: center; padding: 48px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media (max-width: 500px) {
    .header-title { font-size: 1rem; }
    main { padding: 16px 12px 80px; }
    .qa-question { padding: 12px; }
    .qa-answer { padding: 12px 12px 14px 44px; }
    .gate-box { padding: 32px 20px; }
  }
</style>
</head>
<body>

<!-- ── 로그인 게이트 ── -->
<div id="gateScreen">
  <div class="gate-box">
    <div class="gate-logo">🏗</div>
    <div class="gate-title">매화마을1단지<br>리모델링 Q&amp;A</div>
    <div class="gate-sub">조합원 전용 페이지입니다.<br>이메일과 비밀번호로 로그인해주세요.</div>
    <div class="gate-form">
      <label class="gate-label">이메일</label>
      <input type="email" class="gate-input" id="gateEmail" placeholder="이메일 입력">
      <label class="gate-label">비밀번호</label>
      <input type="password" class="gate-input" id="gatePw" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter')doGateLogin()">
      <button class="gate-btn" id="gateBtn" onclick="doGateLogin()">로그인</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>
</div>

<!-- ── 헤더 ── -->
<header>
  <div class="header-inner">
    <div>
      <div class="header-title">
        🏗 매화마을1단지 리모델링 Q&amp;A
        <span id="roleBadge" class="role-badge" style="display:none"></span>
      </div>
      <div class="header-subtitle">매화마을1단지 리모델링 추진위원회</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div class="sync-status">
        <span class="dot loading" id="syncDot"></span>
        <span id="syncLabel">연결 중...</span>
      </div>
      <button class="btn-header" onclick="doLogout()">🔓 로그아웃</button>
    </div>
  </div>
</header>

<!-- ── 본문 ── -->
<main>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="질문이나 답변 내용으로 검색..." oninput="renderList()">
  </div>
  <div class="filter-row" id="filterRow">
    <div class="chip active" onclick="setFilter('전체')">전체</div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="qa-list" id="qaList"><div class="spinner-wrap"><div class="spinner"></div></div></div>
</main>

<button class="fab" id="fab" onclick="openEditModal()" title="새 Q&A 추가">＋</button>

<!-- Q&A 추가/수정 모달 -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-title" id="editModalTitle">새 Q&amp;A 추가</div>
    <div class="form-group">
      <label>카테고리</label>
      <input type="text" class="form-control" id="fCategory" placeholder="예: 법무, 재무, 시공, 총회 등" list="categoryList">
      <datalist id="categoryList"></datalist>
    </div>
    <div class="form-group">
      <label>질문 *</label>
      <textarea class="form-control" id="fQuestion" placeholder="조합원이 질문한 내용을 입력하세요" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>답변 *</label>
      <textarea class="form-control" id="fAnswer" placeholder="공식 답변 또는 검토 내용을 입력하세요" rows="5"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc,
         doc, getDoc, serverTimestamp, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9TZ_xoEY40CmQz8h1gGL2579rwMu0yso",
  authDomain: "maehwa-1-remodeling.firebaseapp.com",
  projectId: "maehwa-1-remodeling",
  storageBucket: "maehwa-1-remodeling.firebasestorage.app",
  messagingSenderId: "48080213648",
  appId: "1:48080213648:web:b9665850e766975190ea15"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

let items = [], editId = null, activeFilter = '전체', isAdmin = false;

// ── 로그인 게이트 ──────────────────────────────────────────
window.doGateLogin = async () => {
  const email = document.getElementById('gateEmail').value.trim();
  const pw    = document.getElementById('gatePw').value;
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');
  if (!email || !pw) { err.textContent = '이메일과 비밀번호를 입력해주세요.'; return; }
  btn.disabled = true; btn.textContent = '로그인 중...';
  err.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch (e) {
    err.textContent =
      e.code === 'auth/invalid-credential' ? '이메일 또는 비밀번호가 올바르지 않습니다.' :
      e.code === 'auth/too-many-requests'  ? '시도 횟수 초과. 잠시 후 다시 시도해주세요.' :
      '로그인 오류: ' + e.message;
    btn.disabled = false; btn.textContent = '로그인';
  }
};

window.doLogout = async () => {
  if (confirm('로그아웃 하시겠습니까?')) await signOut(auth);
};

// ── Auth 상태 감지 + 역할 확인 ────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) {
    // 비로그인 → 게이트 표시, 본문 숨김
    document.getElementById('gateScreen').style.display = 'flex';
    document.getElementById('gateBtn').disabled = false;
    document.getElementById('gateBtn').textContent = '로그인';
    document.getElementById('roleBadge').style.display = 'none';
    document.getElementById('fab').classList.remove('visible');
    isAdmin = false;
    return;
  }

  // 로그인 성공 → 게이트 숨김
  document.getElementById('gateScreen').style.display = 'none';

  // Firestore config/admins 문서에서 관리자 이메일 목록 확인
  try {
    const adminDoc = await getDoc(doc(db, 'config', 'admins'));
    const adminEmails = adminDoc.exists() ? (adminDoc.data().emails || []) : [];
    isAdmin = adminEmails.includes(user.email);
  } catch {
    isAdmin = false;
  }

  // 역할 배지
  const badge = document.getElementById('roleBadge');
  badge.style.display = '';
  badge.textContent   = isAdmin ? '관리자' : '조합원';
  badge.className     = `role-badge ${isAdmin ? 'admin' : 'member'}`;

  // 관리자만 FAB 표시
  document.getElementById('fab').classList.toggle('visible', isAdmin);

  renderList();
});

// ── Firestore 실시간 구독 ─────────────────────────────────
const q = query(collection(db, 'qa_items'), orderBy('createdAt', 'desc'));
onSnapshot(q,
  snap => {
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('syncDot').className = 'dot';
    document.getElementById('syncLabel').textContent = '실시간 연결됨';
    renderList();
  },
  () => {
    document.getElementById('syncDot').className = 'dot off';
    document.getElementById('syncLabel').textContent = '연결 오류';
  }
);

// ── Q&A 편집 ──────────────────────────────────────────────
window.openEditModal = (id = null) => {
  editId = id;
  document.getElementById('editModalTitle').textContent = id ? 'Q&A 수정' : '새 Q&A 추가';
  if (id) {
    const item = items.find(i => i.id === id);
    document.getElementById('fCategory').value = item.category || '';
    document.getElementById('fQuestion').value = item.question;
    document.getElementById('fAnswer').value   = item.answer;
  } else {
    document.getElementById('fCategory').value = '';
    document.getElementById('fQuestion').value = '';
    document.getElementById('fAnswer').value   = '';
  }
  document.getElementById('editModal').classList.add('show');
  setTimeout(() => document.getElementById('fQuestion').focus(), 100);
};
window.closeEditModal = () => document.getElementById('editModal').classList.remove('show');

window.saveItem = async () => {
  const category = document.getElementById('fCategory').value.trim();
  const question = document.getElementById('fQuestion').value.trim();
  const answer   = document.getElementById('fAnswer').value.trim();
  if (!question || !answer) { alert('질문과 답변을 모두 입력해주세요.'); return; }
  try {
    if (editId) {
      await updateDoc(doc(db, 'qa_items', editId), { category, question, answer, updatedAt: serverTimestamp() });
    } else {
      await addDoc(collection(db, 'qa_items'), { category, question, answer, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    closeEditModal();
  } catch (e) { alert('저장 오류: ' + e.message); }
};

window.deleteItem = async id => {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  try { await deleteDoc(doc(db, 'qa_items', id)); }
  catch (e) { alert('삭제 오류: ' + e.message); }
};

// ── 필터 & 렌더링 ─────────────────────────────────────────
window.setFilter = cat => { activeFilter = cat; renderList(); };
window.toggle    = id  => document.getElementById('item-' + id)?.classList.toggle('open');

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hi(text, q) {
  if (!q) return esc(text);
  return esc(text).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}
function fmt(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });
}

window.renderList = () => {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))];

  document.getElementById('categoryList').innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');

  const fr = document.getElementById('filterRow');
  fr.innerHTML = `<div class="chip ${activeFilter==='전체'?'active':''}" onclick="setFilter('전체')">전체</div>`;
  cats.forEach(c => {
    fr.innerHTML += `<div class="chip ${activeFilter===c?'active':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</div>`;
  });

  let filtered = items;
  if (activeFilter !== '전체') filtered = filtered.filter(i => i.category === activeFilter);
  if (q) filtered = filtered.filter(i =>
    i.question.toLowerCase().includes(q) ||
    i.answer.toLowerCase().includes(q) ||
    (i.category||'').toLowerCase().includes(q)
  );

  document.getElementById('statsBar').textContent = `총 ${items.length}개 항목 · 표시 ${filtered.length}개`;

  const list = document.getElementById('qaList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">${q?'🔍':'📋'}</div>
      <p>${q?`'${esc(q)}'에 대한 결과가 없습니다.`:'아직 등록된 Q&A가 없습니다.<br>관리자가 첫 번째 항목을 추가할 예정입니다.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(item => `
    <div class="qa-item" id="item-${item.id}">
      <div class="qa-question" onclick="toggle('${item.id}')">
        <div class="qa-q-mark">Q</div>
        <div class="qa-q-content">
          <div class="qa-q-text">${hi(item.question, q)}</div>
          <div class="qa-meta">
            ${item.category ? `<span class="qa-tag">${hi(item.category, q)}</span>` : ''}
            <span class="qa-date">${fmt(item.createdAt)}</span>
          </div>
        </div>
        <div class="qa-chevron">▾</div>
      </div>
      <div class="qa-answer">
        <span class="qa-a-mark">A</span>
        <span class="qa-a-text">${hi(item.answer, q)}</span>
        ${isAdmin ? `
        <div class="qa-item-actions">
          <button class="btn-sm" onclick="event.stopPropagation();openEditModal('${item.id}')">✏ 수정</button>
          <button class="btn-sm danger" onclick="event.stopPropagation();deleteItem('${item.id}')">🗑 삭제</button>
        </div>` : ''}
      </div>
    </div>`).join('');
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEditModal();
});
</script>
</body>
</html>
